- name: Setup Ubuntu host with Xubuntu GUI
  hosts: all
  connection: local
  gather_facts: false
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3
    desktop_package: xubuntu-core
    disable_systemd_networkd: true

    bash_history_lines:
      - regexp: '^export HISTTIMEFORMAT='
        line: 'export HISTTIMEFORMAT="%d%b%Y-%H%M.%S "'
      - regexp: '^export HISTSIZE='
        line: 'export HISTSIZE=10000'
      - regexp: '^export HISTFILESIZE='
        line: 'export HISTFILESIZE=20000'
      - regexp: '^export HISTCONTROL='
        line: 'export HISTCONTROL=ignoredups:erasedups'
      - regexp: '^shopt -s histappend'
        line: 'shopt -s histappend'
      - regexp: '^PROMPT_COMMAND=.*history -a.*'
        line: 'PROMPT_COMMAND="history -a; $PROMPT_COMMAND"'

    xfce_settings:
      - channel: xfce4-screensaver
        property: /idle-activation-enabled
        type: bool
        value: "false"
      - channel: xfce4-screensaver
        property: /lock-enabled
        type: bool
        value: "false"
      - channel: xfce4-screensaver
        property: /lock-delay
        type: int
        value: "0"
      - channel: xfce4-screensaver
        property: /saver/enabled
        type: bool
        value: "false"
      - channel: xfce4-power-manager
        property: /xfce4-power-manager/lock-screen-suspend-hibernate
        type: bool
        value: "false"
      - channel: xfce4-power-manager
        property: /xfce4-power-manager/dpms-enabled
        type: bool
        value: "false"
      - channel: xfce4-power-manager
        property: /xfce4-power-manager/blank-on-ac
        type: int
        value: "0"

  vars_prompt:
    - name: ansible_become_password
      prompt: >-
        Enter the user password so this playbook can run privileged (root) tasks
      private: true

  pre_tasks:
    - name: Validate nonRootUser was provided
      ansible.builtin.assert:
        that:
          - nonRootUser is defined
          - nonRootUser | length > 0
        fail_msg: 'Run with --extra-vars "nonRootUser=$USER"'
      become: false

    - name: Check for classic sudo on sudo-rs systems
      ansible.builtin.stat:
        path: /usr/bin/sudo.ws
      register: sudo_ws
      become: false

    - name: Select sudo executable
      ansible.builtin.set_fact:
        ansible_become_exe: "{{ '/usr/bin/sudo.ws' if sudo_ws.stat.exists else 'sudo' }}"
      become: false

    - name: Gather facts after sudo executable selection
      ansible.builtin.setup:
      become: false

    - name: Read desktop user account
      ansible.builtin.getent:
        database: passwd
        key: "{{ nonRootUser }}"
      become: false

    - name: Set desktop user home directory
      ansible.builtin.set_fact:
        non_root_home: "{{ ansible_facts.getent_passwd[nonRootUser][4] }}"
      become: false

  handlers:
    - name: Update grub
      ansible.builtin.command:
        cmd: update-grub

    - name: Generate netplan
      ansible.builtin.command:
        cmd: netplan generate
      listen: Apply netplan

    - name: Apply netplan
      ansible.builtin.command:
        cmd: netplan apply
      listen: Apply netplan

  tasks:
    - name: Check desktop user .bashrc
      ansible.builtin.stat:
        path: "{{ non_root_home }}/.bashrc"
      register: desktop_bashrc

    - name: Create desktop user .bashrc if missing
      ansible.builtin.file:
        path: "{{ non_root_home }}/.bashrc"
        state: touch
        owner: "{{ nonRootUser }}"
        group: "{{ nonRootUser }}"
        mode: "0644"
      when: not desktop_bashrc.stat.exists

    - name: Ensure desktop user .bashrc ownership and permissions
      ansible.builtin.file:
        path: "{{ non_root_home }}/.bashrc"
        state: file
        owner: "{{ nonRootUser }}"
        group: "{{ nonRootUser }}"
        mode: "0644"

    - name: Add h2d and d2h conversion functions
      ansible.builtin.blockinfile:
        path: "{{ non_root_home }}/.bashrc"
        marker: "# {mark} ANSIBLE h2d/d2h converters"
        block: |
          h2d(){ printf '%d\n' "$((16#$1))"; }
          d2h(){ printf '%X\n' "$1"; }

    - name: Configure bash history for desktop user
      ansible.builtin.lineinfile:
        path: "{{ non_root_home }}/.bashrc"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        state: present
        owner: "{{ nonRootUser }}"
        group: "{{ nonRootUser }}"
        mode: "0644"
      loop: "{{ bash_history_lines }}"

    - name: Check root .bashrc
      ansible.builtin.stat:
        path: /root/.bashrc
      register: root_bashrc

    - name: Create root .bashrc if missing
      ansible.builtin.file:
        path: /root/.bashrc
        state: touch
        owner: root
        group: root
        mode: "0644"
      when: not root_bashrc.stat.exists

    - name: Ensure root .bashrc ownership and permissions
      ansible.builtin.file:
        path: /root/.bashrc
        state: file
        owner: root
        group: root
        mode: "0644"

    - name: Configure bash history for root user
      ansible.builtin.lineinfile:
        path: /root/.bashrc
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        state: present
        owner: root
        group: root
        mode: "0644"
      loop: "{{ bash_history_lines }}"

    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure software-properties-common is installed
      ansible.builtin.apt:
        name: software-properties-common
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Enable Ubuntu universe repository
      ansible.builtin.command:
        cmd: add-apt-repository --yes universe
      register: universe_repo
      changed_when: >-
        'Adding component' in universe_repo.stdout or
        'enabled' in universe_repo.stdout or
        'Adding' in universe_repo.stdout
      when: ansible_distribution == "Ubuntu"

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - build-essential
          - net-tools
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    # Important: set the display-manager choice before installing the desktop.
    # Otherwise, if gdm/gdm3 is pulled in as a dependency/recommendation during the
    # xubuntu-core transaction, it may become the active display manager.
    - name: Preseed LightDM as default display manager
      ansible.builtin.debconf:
        name: lightdm
        question: shared/default-x-display-manager
        value: lightdm
        vtype: select

    - name: Install Xubuntu desktop packages
      ansible.builtin.apt:
        name:
          - "{{ desktop_package }}"
          - lightdm
          - lightdm-gtk-greeter
          - lightdm-gtk-greeter-settings
          - xubuntu-default-settings
          - xubuntu-artwork
          - dbus-x11
          - xfconf
        state: present
        install_recommends: true
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure /etc/X11 exists
      ansible.builtin.file:
        path: /etc/X11
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Force LightDM as default display manager
      ansible.builtin.copy:
        dest: /etc/X11/default-display-manager
        content: "/usr/sbin/lightdm\n"
        owner: root
        group: root
        mode: "0644"

    - name: Enable LightDM for next boot
      ansible.builtin.systemd:
        name: lightdm.service
        enabled: true
      ignore_errors: true

    # Do not stop the current display manager here. Stopping gdm during a GUI run
    # could log the user out. This only prevents it from being used after reboot.
    - name: Disable GDM for next boot if present
      ansible.builtin.systemd:
        name: gdm.service
        enabled: false
      ignore_errors: true

    - name: Disable GDM3 for next boot if present
      ansible.builtin.systemd:
        name: gdm3.service
        enabled: false
      ignore_errors: true

    - name: Show selected display manager file
      ansible.builtin.command:
        cmd: cat /etc/X11/default-display-manager
      register: selected_display_manager
      changed_when: false

    - name: Print selected display manager
      ansible.builtin.debug:
        var: selected_display_manager.stdout

    - name: Disable IPv6 and console blanking in GRUB
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="ipv6.disable=1 consoleblank=0"'
        backup: true
      notify: Update grub

    - name: Remove ufw
      ansible.builtin.apt:
        name: ufw
        state: absent
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Preseed iptables-persistent IPv4 autosave prompt
      ansible.builtin.debconf:
        name: iptables-persistent
        question: iptables-persistent/autosave_v4
        value: "false"
        vtype: boolean

    - name: Preseed iptables-persistent IPv6 autosave prompt
      ansible.builtin.debconf:
        name: iptables-persistent
        question: iptables-persistent/autosave_v6
        value: "false"
        vtype: boolean

    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure iptables directory exists
      ansible.builtin.file:
        path: /etc/iptables
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create iptables rule file for IPv4
      ansible.builtin.copy:
        dest: /etc/iptables/rules.v4
        mode: "0600"
        owner: root
        group: root
        content: |
          *filter
          :INPUT ACCEPT [0:0]
          :FORWARD ACCEPT [0:0]
          :OUTPUT ACCEPT [0:0]
          -A INPUT -i lo -j ACCEPT
          -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
          # Uncomment the below line to allow incoming ssh on port 7777
          #-A INPUT -m state --state NEW -m tcp -p TCP --dport 7777 -j ACCEPT
          # Uncomment the below line to allow incoming multicast packets
          #-A INPUT -m pkttype --pkt-type multicast -j ACCEPT
          -A INPUT -j REJECT --reject-with icmp-port-unreachable
          -A FORWARD -j REJECT --reject-with icmp-port-unreachable
          COMMIT

    - name: Create iptables rule file for IPv6
      ansible.builtin.copy:
        dest: /etc/iptables/rules.v6
        mode: "0600"
        owner: root
        group: root
        content: |
          *filter
          :INPUT ACCEPT [0:0]
          :FORWARD ACCEPT [0:0]
          :OUTPUT ACCEPT [0:0]
          -A INPUT -j REJECT
          -A OUTPUT -j REJECT
          -A FORWARD -j REJECT
          COMMIT

    - name: Create iptables rule file for debug
      ansible.builtin.copy:
        dest: /etc/iptables/rules.allow_all
        mode: "0600"
        owner: root
        group: root
        content: |
          *filter
          :INPUT ACCEPT [0:0]
          :FORWARD ACCEPT [0:0]
          :OUTPUT ACCEPT [0:0]
          COMMIT

    - name: Ensure LightDM config directory exists
      ansible.builtin.file:
        path: /etc/lightdm/lightdm.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure LightDM autologin
      ansible.builtin.copy:
        dest: /etc/lightdm/lightdm.conf.d/70-autologin.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Seat:*]
          autologin-user={{ nonRootUser }}
          autologin-user-timeout=0

    - name: Remove unused desktop user folders
      ansible.builtin.file:
        path: "{{ non_root_home }}/{{ item }}"
        state: absent
      loop:
        - Public
        - Music
        - Documents
        - Videos
        - Templates

    - name: Check for netplan directory
      ansible.builtin.stat:
        path: /etc/netplan
      register: netplan_dir

    - name: Configure netplan to use NetworkManager
      ansible.builtin.copy:
        dest: /etc/netplan/99-network-manager.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          network:
            version: 2
            renderer: NetworkManager
      notify: Apply netplan
      when: netplan_dir.stat.isdir | default(false)

    - name: Apply network renderer change before disabling networkd
      ansible.builtin.meta: flush_handlers

    - name: Collect service facts
      ansible.builtin.service_facts:

    - name: Disable CUPS if installed
      ansible.builtin.systemd:
        name: cups.service
        enabled: false
        state: stopped
      when: "'cups.service' in ansible_facts.services"

    - name: Disable systemd-networkd-wait-online if installed
      ansible.builtin.systemd:
        name: systemd-networkd-wait-online.service
        enabled: false
        state: stopped
      when: "'systemd-networkd-wait-online.service' in ansible_facts.services"

    - name: Disable systemd-networkd after switching to NetworkManager
      ansible.builtin.systemd:
        name: systemd-networkd.service
        enabled: false
        state: stopped
      when:
        - disable_systemd_networkd | bool
        - "'NetworkManager.service' in ansible_facts.services"
        - "'systemd-networkd.service' in ansible_facts.services"

    - name: Configure XFCE screensaver and power settings for desktop user
      ansible.builtin.command:
        argv:
          - dbus-run-session
          - --
          - xfconf-query
          - --channel
          - "{{ item.channel }}"
          - --property
          - "{{ item.property }}"
          - --create
          - --type
          - "{{ item.type }}"
          - --set
          - "{{ item.value }}"
      become: true
      become_user: "{{ nonRootUser }}"
      environment:
        HOME: "{{ non_root_home }}"
        XDG_CONFIG_HOME: "{{ non_root_home }}/.config"
      loop: "{{ xfce_settings }}"
      changed_when: false

    - name: Refresh service facts after package changes
      ansible.builtin.service_facts:

    - name: Disable and mask apport.service if installed
      ansible.builtin.systemd:
        name: apport.service
        enabled: false
        state: stopped
        masked: true
      when: "'apport.service' in ansible_facts.services"

    - name: Remove ubuntu-report and popularity-contest packages
      ansible.builtin.apt:
        name:
          - ubuntu-report
          - popularity-contest
        state: absent
        purge: true
        autoremove: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure apport is not configured to start
      ansible.builtin.lineinfile:
        path: /etc/default/apport
        regexp: '^enabled='
        line: 'enabled=0'
        create: true
        owner: root
        group: root
        mode: "0644"
